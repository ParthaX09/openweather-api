[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# CLI Options
addopts = -vs --tb=short --html=reports/report.html --self-contained-html

# Register Markers
markers =
    positive: Positive test scenarios
    negative: Negative test scenarios
    edge: Boundary and edge case test scenarios
    schema: JSON schema validation tests
    security: Security, authorization, and permission tests
    performance: Performance, latency, and response time tests
    weather: Tests for Current Weather API
    forecast: Tests for 5-Day Forecast API
    geocoding: Tests for Geocoding API
    pollution: Tests for Air Pollution API

# Logging Settings
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format=%Y-%m-%d %H:%M:%S

log_file = logs/pytest_execution.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_file_date_format=%Y-%m-%d %H:%M:%S
