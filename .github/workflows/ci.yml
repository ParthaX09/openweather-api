name: API Automation CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run nightly regressions at 00:00 UTC
    - cron: '0 0 * * *'

jobs:
  test-offline:
    name: Run Offline Mock Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Logs Directory
        run: mkdir -p logs reports

      - name: Run Tests in Mock Mode (Default)
        # Runs entire test suite using mock interceptor
        run: |
          pytest --html=reports/mock_report.html --self-contained-html

      - name: Upload HTML Test Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: mock-test-report
          path: reports/mock_report.html

      - name: Upload Execution Logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: mock-execution-logs
          path: logs/

  test-live:
    name: Run Live API Integration Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    needs: test-offline
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Logs Directory
        run: mkdir -p logs reports

      - name: Run Live Tests
        # Runs against actual API. Requires a valid API Key from GitHub secrets.
        # Live tests are limited to positive and business logic cases to prevent hitting rate limits
        env:
          OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
          OPENWEATHER_BASE_URL: https://api.openweathermap.org
          ENV: staging
        run: |
          pytest -m "positive or schema" --live --html=reports/live_report.html --self-contained-html

      - name: Upload Live Test Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: live-test-report
          path: reports/live_report.html
